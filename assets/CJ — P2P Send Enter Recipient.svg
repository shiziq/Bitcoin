<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 780" font-family="'Segoe UI', 'SF Pro Display', Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Phone Frame -->
  <rect x="10" y="10" width="380" height="760" rx="35" fill="#1a1a2e" stroke="#30363d" stroke-width="2" filter="url(#shadow)"/>
  <rect x="20" y="20" width="360" height="740" rx="20" fill="#0d1117"/>

  <!-- Status Bar -->
  <text x="35" y="48" fill="#8b949e" font-size="12" font-weight="bold">9:41</text>
  <text x="365" y="48" text-anchor="end" fill="#8b949e" font-size="12">📶 🔋 100%</text>

  <!-- Header -->
  <text x="40" y="85" fill="#e6edf3" font-size="18" font-weight="bold">← Cancel</text>
  <text x="360" y="85" text-anchor="end" fill="#4facfe" font-size="13">Contacts</text>

  <!-- Recipient Input -->
  <rect x="30" y="110" width="340" height="70" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="55" y="135" fill="#8b949e" font-size="10">To</text>
  <text x="55" y="162" fill="#4facfe" font-size="14" font-family="'JetBrains Mono', monospace">0xa1b2c3d4e5f6...</text>

  <!-- Amount Card -->
  <rect x="30" y="195" width="340" height="220" rx="12" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1.5"/>

  <text x="55" y="225" fill="#8b949e" font-size="10">Amount</text>
  <text x="55" y="262" fill="#4facfe" font-size="38" font-weight="bold">50.00</text>
  <text x="280" y="262" text-anchor="end" fill="#4facfe" font-size="16" font-weight="bold">USDT</text>

  <text x="55" y="298" fill="#43e97b" font-size="18" font-weight="bold">≈ KSh 7,250.00</text>

  <line x1="55" y1="320" x2="345" y2="320" stroke="#30363d" stroke-width="0.5"/>

  <text x="55" y="345" fill="#8b949e" font-size="10">Rate:</text>
  <text x="175" y="345" fill="#fee140" font-size="11">1 USDT = KSh 145.00</text>

  <text x="55" y="368" fill="#8b949e" font-size="10">Network fee:</text>
  <text x="175" y="368" fill="#fee140" font-size="11">0.50 USDT (KSh 72.50)</text>

  <text x="55" y="391" fill="#e6edf3" font-size="12" font-weight="bold">Total:</text>
  <text x="175" y="391" fill="#e6edf3" font-size="12">50.50 USDT (KSh 7,322.50)</text>

  <!-- Balance -->
  <rect x="55" y="430" width="290" height="35" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="75" y="453" fill="#8b949e" font-size="10">Your balance:</text>
  <text x="280" y="453" text-anchor="end" fill="#43e97b" font-size="11">600.00 USDT (KSh 87,000)</text>

  <!-- Send Button -->
  <rect x="55" y="485" width="290" height="48" rx="24" fill="#667eea" filter="url(#shadow)"/>
  <text x="200" y="515" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">📤 Send 50.00 USDT</text>

  <text x="200" y="548" text-anchor="middle" fill="#8b949e" font-size="10">You will confirm in Bato Authenticator</text>
  <text x="200" y="565" text-anchor="middle" fill="#43e97b" font-size="10">✅ No SMS required</text>

  <!-- Bottom Navigation -->
  <rect x="20" y="740" width="360" height="42" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="55" y="766" text-anchor="middle" fill="#8b949e" font-size="14">🏠</text>
  <text x="130" y="766" text-anchor="middle" fill="#8b949e" font-size="14">💳</text>
  <text x="205" y="766" text-anchor="middle" fill="#667eea" font-size="14">📤</text>
  <text x="280" y="766" text-anchor="middle" fill="#8b949e" font-size="14">📊</text>
  <text x="355" y="766" text-anchor="middle" fill="#8b949e" font-size="14">⚙️</text>

  <rect x="160" y="788" width="80" height="4" rx="2" fill="#30363d"/>
</svg>