<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 780" font-family="'Segoe UI', 'SF Pro Display', Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Phone Frame -->
  <rect x="10" y="10" width="380" height="760" rx="35" fill="#1a1a2e" stroke="#30363d" stroke-width="2" filter="url(#shadow)"/>
  <rect x="20" y="20" width="360" height="740" rx="20" fill="#0d1117"/>

  <!-- Status Bar -->
  <text x="35" y="48" fill="#8b949e" font-size="12" font-weight="bold">9:41</text>
  <text x="365" y="48" text-anchor="end" fill="#8b949e" font-size="12">📶 🔋 100%</text>

  <!-- Header -->
  <text x="40" y="85" fill="#e6edf3" font-size="20" font-weight="bold">KCB</text>
  <text x="360" y="85" text-anchor="end" fill="#8b949e" font-size="13">🔔</text>

  <text x="40" y="115" fill="#e6edf3" font-size="18" font-weight="bold">Your Digital Wallet</text>
  <text x="40" y="140" fill="#8b949e" font-size="12">Hold, send, and spend USDT straight from your bank app</text>

  <!-- Empty State Card -->
  <rect x="30" y="165" width="340" height="320" rx="14" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Empty Wallet Icon -->
  <circle cx="200" cy="225" r="45" fill="#30363d" opacity="0.5"/>
  <text x="200" y="238" text-anchor="middle" fill="#8b949e" font-size="32">💰</text>

  <text x="200" y="290" text-anchor="middle" fill="#8b949e" font-size="11">Balance</text>
  <text x="200" y="330" text-anchor="middle" fill="#e6edf3" font-size="38" font-weight="bold">0.00 USDT</text>
  <text x="200" y="365" text-anchor="middle" fill="#8b949e" font-size="16">KSh 0.00</text>

  <!-- Buttons -->
  <rect x="55" y="405" width="290" height="44" rx="22" fill="#667eea" filter="url(#shadow)"/>
  <text x="200" y="433" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">Get Started</text>

  <rect x="135" y="460" width="130" height="36" rx="18" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="200" y="484" text-anchor="middle" fill="#8b949e" font-size="13">Learn More</text>

  <!-- Footer -->
  <text x="200" y="520" text-anchor="middle" fill="#8b949e" font-size="10">Powered by Bato · Polygon</text>

  <!-- Bottom Navigation -->
  <rect x="20" y="740" width="360" height="42" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="55" y="766" text-anchor="middle" fill="#667eea" font-size="14">🏠</text>
  <text x="130" y="766" text-anchor="middle" fill="#8b949e" font-size="14">💳</text>
  <text x="205" y="766" text-anchor="middle" fill="#8b949e" font-size="14">📤</text>
  <text x="280" y="766" text-anchor="middle" fill="#8b949e" font-size="14">📊</text>
  <text x="355" y="766" text-anchor="middle" fill="#8b949e" font-size="14">⚙️</text>

  <rect x="160" y="788" width="80" height="4" rx="2" fill="#30363d"/>
</svg>