<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 780" font-family="'Segoe UI', 'SF Pro Display', Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="braceletGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Phone Frame -->
  <rect x="10" y="10" width="380" height="760" rx="35" fill="#1a1a2e" stroke="#30363d" stroke-width="2" filter="url(#shadow)"/>
  <rect x="20" y="20" width="360" height="740" rx="20" fill="#0d1117"/>

  <!-- Status Bar -->
  <text x="35" y="48" fill="#8b949e" font-size="12" font-weight="bold">9:41</text>
  <text x="365" y="48" text-anchor="end" fill="#8b949e" font-size="12">📶 🔋 100%</text>

  <!-- Header -->
  <text x="40" y="85" fill="#e6edf3" font-size="18" font-weight="bold">← Back</text>
  <text x="360" y="85" text-anchor="end" fill="#4facfe" font-size="13">Help</text>

  <!-- Bracelet Card -->
  <rect x="30" y="110" width="340" height="80" rx="12" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1.5"/>

  <circle cx="65" cy="150" r="20" fill="url(#braceletGrad)" opacity="0.2"/>
  <text x="65" y="156" text-anchor="middle" fill="#43e97b" font-size="16">⌚</text>

  <text x="100" y="145" fill="#e6edf3" font-size="16" font-weight="bold">PayBand</text>
  <text x="100" y="168" fill="#4facfe" font-size="14" font-family="'JetBrains Mono', monospace">#A3K9</text>

  <text x="310" y="168" text-anchor="end" fill="#43e97b" font-size="11">● Connected</text>

  <!-- Amount Card -->
  <rect x="30" y="205" width="340" height="220" rx="12" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1.5"/>

  <text x="200" y="238" text-anchor="middle" fill="#8b949e" font-size="11">Amount to load</text>

  <text x="200" y="285" text-anchor="middle" fill="#4facfe" font-size="38" font-weight="bold">50.00</text>
  <text x="200" y="312" text-anchor="middle" fill="#4facfe" font-size="14" font-weight="bold">USDT</text>

  <line x1="55" y1="330" x2="345" y2="330" stroke="#30363d" stroke-width="0.5"/>

  <text x="200" y="360" text-anchor="middle" fill="#43e97b" font-size="18" font-weight="bold">≈ KSh 7,250.00</text>
  <text x="200" y="385" text-anchor="middle" fill="#8b949e" font-size="11">Rate: 1 USDT = KSh 145.00</text>

  <!-- NFC Instruction -->
  <rect x="55" y="440" width="290" height="60" rx="8" fill="#161b22" stroke="#fee140" stroke-width="1"/>
  <text x="200" y="462" text-anchor="middle" fill="#fee140" font-size="11" font-weight="bold">📱 NFC Tap Required</text>
  <text x="200" y="482" text-anchor="middle" fill="#8b949e" font-size="10">Bring bracelet close to phone's NFC reader</text>
  <text x="200" y="495" text-anchor="middle" fill="#8b949e" font-size="10">Once QR code appears</text>

  <!-- Authenticator Button -->
  <rect x="55" y="520" width="290" height="48" rx="24" fill="#667eea" filter="url(#shadow)"/>
  <text x="200" y="550" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🔐 Open Authenticator to Confirm</text>

  <!-- Bottom Navigation -->
  <rect x="20" y="740" width="360" height="42" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="55" y="766" text-anchor="middle" fill="#8b949e" font-size="14">🏠</text>
  <text x="130" y="766" text-anchor="middle" fill="#8b949e" font-size="14">💳</text>
  <text x="205" y="766" text-anchor="middle" fill="#667eea" font-size="14">⌚</text>
  <text x="280" y="766" text-anchor="middle" fill="#8b949e" font-size="14">📊</text>
  <text x="355" y="766" text-anchor="middle" fill="#8b949e" font-size="14">⚙️</text>

  <rect x="160" y="788" width="80" height="4" rx="2" fill="#30363d"/>
</svg>