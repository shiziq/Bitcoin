<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <style>
      .ui { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
      .mono { font-family: 'Courier New', Courier, 'Liberation Mono', monospace; }
    </style>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1e2837"/><stop offset="100%" style="stop-color:#0a0f1e"/></linearGradient>
  </defs>
  <rect width="800" height="520" fill="url(#bg)" rx="16"/>
  <text x="400" y="40" class="ui" font-size="18" fill="#ffffff" text-anchor="middle" font-weight="800">Error States &amp; Edge Cases — Developer Reference</text>

  <rect x="30" y="60" width="740" height="30" rx="4" fill="#2d3a4f"/>
  <text x="120" y="80" class="mono" font-size="10" fill="#94a3b8" font-weight="700">ERROR TYPE</text>
  <text x="300" y="80" class="ui" font-size="10" fill="#94a3b8" font-weight="700">TRIGGER</text>
  <text x="500" y="80" class="ui" font-size="10" fill="#94a3b8" font-weight="700">USER SEES</text>
  <text x="660" y="80" class="ui" font-size="10" fill="#94a3b8" font-weight="700">RECOVERY</text>

  <rect x="30" y="90" width="740" height="50" rx="2" fill="rgba(255,255,255,0.03)"/>
  <text x="120" y="114" class="mono" font-size="9" fill="#ff7b72">RateUnavailableError</text>
  <text x="300" y="114" class="ui" font-size="9" fill="#cbd5e1">All 3 feeds fail + cache stale</text>
  <text x="500" y="114" class="ui" font-size="9" fill="#f59e0b">"Rate temporarily unavailable. Please try again."</text>
  <text x="660" y="114" class="ui" font-size="9" fill="#94a3b8">Retry button. Backend forces refresh.</text>

  <rect x="30" y="140" width="740" height="50" rx="2" fill="rgba(255,255,255,0.02)"/>
  <text x="120" y="164" class="mono" font-size="9" fill="#ff7b72">RateExpiredError</text>
  <text x="300" y="164" class="ui" font-size="9" fill="#cbd5e1">Rate lock (30s) expired before confirm</text>
  <text x="500" y="164" class="ui" font-size="9" fill="#f59e0b">"Rate has expired. Refresh and try again."</text>
  <text x="660" y="164" class="ui" font-size="9" fill="#94a3b8">Auto-refresh preview with new rate.</text>

  <rect x="30" y="190" width="740" height="50" rx="2" fill="rgba(255,255,255,0.03)"/>
  <text x="120" y="214" class="mono" font-size="9" fill="#ff7b72">InsufficientFundsError</text>
  <text x="300" y="214" class="ui" font-size="9" fill="#cbd5e1">USDT balance &lt; amount + fees</text>
  <text x="500" y="214" class="ui" font-size="9" fill="#f59e0b">"Insufficient balance. Load more USDT."</text>
  <text x="660" y="214" class="ui" font-size="9" fill="#94a3b8">Navigate to Load Wallet screen.</text>

  <rect x="30" y="240" width="740" height="50" rx="2" fill="rgba(255,255,255,0.02)"/>
  <text x="120" y="264" class="mono" font-size="9" fill="#ff7b72">QRCodeExpiredError</text>
  <text x="300" y="264" class="ui" font-size="9" fill="#cbd5e1">QR expired (5-min TTL passed)</text>
  <text x="500" y="264" class="ui" font-size="9" fill="#f59e0b">"QR code expired. Ask cashier for new code."</text>
  <text x="660" y="264" class="ui" font-size="9" fill="#94a3b8">User rescans. Cashier regenerates.</text>

  <rect x="30" y="290" width="740" height="50" rx="2" fill="rgba(255,255,255,0.03)"/>
  <text x="120" y="314" class="mono" font-size="9" fill="#ff7b72">SecurityError</text>
  <text x="300" y="314" class="ui" font-size="9" fill="#cbd5e1">Invalid merchant signature / device key</text>
  <text x="500" y="314" class="ui" font-size="9" fill="#e11d48">"Security warning: invalid signature."</text>
  <text x="660" y="314" class="ui" font-size="9" fill="#94a3b8">Block. Log event. Flag for fraud review.</text>

  <rect x="30" y="340" width="740" height="50" rx="2" fill="rgba(255,255,255,0.02)"/>
  <text x="120" y="364" class="mono" font-size="9" fill="#ff7b72">PhoneAlreadyRegisteredError</text>
  <text x="300" y="364" class="ui" font-size="9" fill="#cbd5e1">Phone number already has active wallet</text>
  <text x="500" y="364" class="ui" font-size="9" fill="#f59e0b">"This number is registered. Recover instead?"</text>
  <text x="660" y="364" class="ui" font-size="9" fill="#94a3b8">Offer recovery flow. Do not reveal account.</text>

  <rect x="30" y="390" width="740" height="50" rx="2" fill="rgba(255,255,255,0.03)"/>
  <text x="120" y="414" class="mono" font-size="9" fill="#ff7b72">CustomerNotFoundError</text>
  <text x="300" y="414" class="ui" font-size="9" fill="#cbd5e1">No bank account linked to phone number</text>
  <text x="500" y="414" class="ui" font-size="9" fill="#f59e0b">"No bank account found for this number."</text>
  <text x="660" y="414" class="ui" font-size="9" fill="#94a3b8">Direct to bank branch or customer support.</text>

  <rect x="30" y="440" width="740" height="50" rx="2" fill="rgba(255,255,255,0.02)"/>
  <text x="120" y="464" class="mono" font-size="9" fill="#ff7b72">TransactionFailedError</text>
  <text x="300" y="464" class="ui" font-size="9" fill="#cbd5e1">Blockchain TX reverted after submission</text>
  <text x="500" y="464" class="ui" font-size="9" fill="#e11d48">"Transaction failed. No funds lost. Retry?"</text>
  <text x="660" y="464" class="ui" font-size="9" fill="#94a3b8">Show TX hash for support. Allow retry.</text>
</svg>