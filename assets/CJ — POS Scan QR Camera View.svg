<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 780" font-family="'Segoe UI', 'SF Pro Display', Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:0.9" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Phone Frame -->
  <rect x="10" y="10" width="380" height="760" rx="35" fill="#1a1a2e" stroke="#30363d" stroke-width="2" filter="url(#shadow)"/>
  <rect x="20" y="20" width="360" height="740" rx="20" fill="#0d1117"/>

  <!-- Status Bar -->
  <text x="35" y="48" fill="#8b949e" font-size="12" font-weight="bold">9:41</text>
  <text x="365" y="48" text-anchor="end" fill="#8b949e" font-size="12">📶 🔋 100%</text>

  <!-- Header -->
  <text x="40" y="85" fill="#e6edf3" font-size="18" font-weight="bold">← Cancel</text>
  <text x="360" y="85" text-anchor="end" fill="#4facfe" font-size="13">Flash</text>

  <!-- QR Scanner Overlay -->
  <rect x="30" y="110" width="340" height="340" rx="12" fill="#0d1117" stroke="#667eea" stroke-width="2"/>

  <!-- Scanning Animation -->
  <rect x="55" y="135" width="290" height="290" rx="8" fill="#0d1117" stroke="#4facfe" stroke-width="1.5"/>
  <rect x="55" y="135" width="290" height="290" rx="8" fill="none" stroke="#667eea" stroke-width="2" opacity="0.3"/>

  <!-- Corner markers -->
  <rect x="65" y="145" width="20" height="20" rx="3" fill="none" stroke="#4facfe" stroke-width="2.5"/>
  <rect x="315" y="145" width="20" height="20" rx="3" fill="none" stroke="#4facfe" stroke-width="2.5"/>
  <rect x="65" y="395" width="20" height="20" rx="3" fill="none" stroke="#4facfe" stroke-width="2.5"/>
  <rect x="315" y="395" width="20" height="20" rx="3" fill="none" stroke="#4facfe" stroke-width="2.5"/>

  <!-- Scan Line -->
  <line x1="75" y1="280" x2="325" y2="280" stroke="#4facfe" stroke-width="2" opacity="0.6">
    <animate attributeName="y1" from="145" to="415" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="y2" from="145" to="415" dur="2.5s" repeatCount="indefinite"/>
  </line>

  <text x="200" y="470" text-anchor="middle" fill="#e6edf3" font-size="12">Point camera at merchant's QR code</text>

  <!-- Scan Result Card -->
  <rect x="30" y="490" width="340" height="150" rx="12" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1.5"/>

  <text x="55" y="518" fill="#e6edf3" font-size="15" font-weight="bold">🏪 Naivas Supermarket</text>
  <text x="55" y="538" fill="#8b949e" font-size="11">Moi Avenue, Nairobi</text>

  <line x1="55" y1="555" x2="345" y2="555" stroke="#30363d" stroke-width="0.5"/>

  <text x="55" y="582" fill="#43e97b" font-size="22" font-weight="bold">KSh 650.00</text>
  <text x="320" y="582" text-anchor="end" fill="#4facfe" font-size="16" font-weight="bold">4.48 USDT</text>

  <text x="55" y="608" fill="#8b949e" font-size="10">Rate: 1 USDT = KSh 145.00</text>

  <!-- Action Button -->
  <rect x="55" y="660" width="290" height="48" rx="24" fill="#667eea" filter="url(#shadow)"/>
  <text x="200" y="690" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">✅ Pay KSh 650.00</text>

  <text x="200" y="720" text-anchor="middle" fill="#8b949e" font-size="10">Confirm in Bato Authenticator</text>

  <!-- Bottom Navigation -->
  <rect x="20" y="740" width="360" height="42" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="55" y="766" text-anchor="middle" fill="#8b949e" font-size="14">🏠</text>
  <text x="130" y="766" text-anchor="middle" fill="#8b949e" font-size="14">💳</text>
  <text x="205" y="766" text-anchor="middle" fill="#667eea" font-size="14">📸</text>
  <text x="280" y="766" text-anchor="middle" fill="#8b949e" font-size="14">📊</text>
  <text x="355" y="766" text-anchor="middle" fill="#8b949e" font-size="14">⚙️</text>

  <rect x="160" y="788" width="80" height="4" rx="2" fill="#30363d"/>
</svg>