<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 780" font-family="'Segoe UI', 'SF Pro Display', Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="batoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Phone Frame -->
  <rect x="10" y="10" width="380" height="760" rx="35" fill="#1a1a2e" stroke="#30363d" stroke-width="2" filter="url(#shadow)"/>
  <rect x="20" y="20" width="360" height="740" rx="20" fill="#0d1117"/>

  <!-- Status Bar -->
  <text x="35" y="48" fill="#8b949e" font-size="12" font-weight="bold">9:41</text>
  <text x="365" y="48" text-anchor="end" fill="#8b949e" font-size="12">📶 🔋 100%</text>

  <!-- Header -->
  <text x="40" y="85" fill="#e6edf3" font-size="20" font-weight="bold">KCB Bank</text>
  <text x="360" y="85" text-anchor="end" fill="#8b949e" font-size="13">🔔</text>

  <text x="40" y="112" fill="#8b949e" font-size="14">Good morning, Jane</text>

  <!-- Account Card -->
  <rect x="30" y="130" width="340" height="80" rx="12" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1.5"/>

  <text x="55" y="158" fill="#8b949e" font-size="10">Savings Account (...4521)</text>
  <text x="55" y="190" fill="#e6edf3" font-size="24" font-weight="bold">KSh 150,000.00</text>
  <text x="330" y="190" text-anchor="end" fill="#4facfe" font-size="13">View →</text>

  <!-- Bato Digital Wallet Card -->
  <rect x="30" y="225" width="340" height="75" rx="12" fill="url(#batoGrad)" filter="url(#shadow)"/>

  <text x="55" y="255" fill="#fff" font-size="14" font-weight="bold">💎 Bato — Digital Wallet</text>
  <text x="55" y="280" fill="#fff" opacity="0.8" font-size="11">Send, receive &amp; pay with USDT</text>

  <!-- Quick Actions -->
  <text x="40" y="330" fill="#e6edf3" font-size="14" font-weight="bold">Quick Actions</text>

  <rect x="30" y="345" width="105" height="60" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="82" y="375" text-anchor="middle" fill="#4facfe" font-size="18">💸</text>
  <text x="82" y="395" text-anchor="middle" fill="#8b949e" font-size="10">Transfer</text>

  <rect x="147" y="345" width="105" height="60" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="200" y="375" text-anchor="middle" fill="#43e97b" font-size="18">📃</text>
  <text x="200" y="395" text-anchor="middle" fill="#8b949e" font-size="10">Pay Bills</text>

  <rect x="265" y="345" width="105" height="60" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="317" y="375" text-anchor="middle" fill="#fee140" font-size="18">💳</text>
  <text x="317" y="395" text-anchor="middle" fill="#8b949e" font-size="10">Cards</text>

  <!-- Recent -->
  <text x="40" y="435" fill="#e6edf3" font-size="14" font-weight="bold">Recent</text>

  <rect x="30" y="450" width="340" height="45" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="55" y="470" fill="#8b949e" font-size="12">💸 M-Pesa Transfer</text>
  <text x="330" y="470" text-anchor="end" fill="#e6edf3" font-size="12">KSh 2,500.00</text>

  <rect x="30" y="500" width="340" height="45" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="55" y="520" fill="#8b949e" font-size="12">🛒 Naivas Supermarket</text>
  <text x="330" y="520" text-anchor="end" fill="#e6edf3" font-size="12">KSh 1,250.00</text>

  <rect x="30" y="550" width="340" height="45" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="55" y="570" fill="#8b949e" font-size="12">📱 Bato Load</text>
  <text x="330" y="570" text-anchor="end" fill="#43e97b" font-size="12">+200.00 USDT</text>

  <!-- Bottom Navigation -->
  <rect x="20" y="740" width="360" height="42" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="55" y="766" text-anchor="middle" fill="#667eea" font-size="14">🏠</text>
  <text x="130" y="766" text-anchor="middle" fill="#8b949e" font-size="14">💳</text>
  <text x="205" y="766" text-anchor="middle" fill="#8b949e" font-size="14">📤</text>
  <text x="280" y="766" text-anchor="middle" fill="#8b949e" font-size="14">📊</text>
  <text x="355" y="766" text-anchor="middle" fill="#8b949e" font-size="14">⚙️</text>

  <rect x="160" y="788" width="80" height="4" rx="2" fill="#30363d"/>
</svg>