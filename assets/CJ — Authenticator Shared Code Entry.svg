<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 780" font-family="'Segoe UI', 'SF Pro Display', Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Phone Frame -->
  <rect x="10" y="10" width="380" height="760" rx="35" fill="#1a1a2e" stroke="#30363d" stroke-width="2" filter="url(#shadow)"/>
  <rect x="20" y="20" width="360" height="740" rx="20" fill="#0d1117"/>

  <!-- Status Bar -->
  <text x="35" y="48" fill="#8b949e" font-size="12" font-weight="bold">9:41</text>
  <text x="365" y="48" text-anchor="end" fill="#8b949e" font-size="12">📶 🔋 100%</text>

  <!-- Header -->
  <text x="40" y="85" fill="#e6edf3" font-size="18" font-weight="bold">← Bato Authenticator</text>

  <!-- Card -->
  <rect x="25" y="110" width="350" height="510" rx="14" fill="url(#cardGrad)" stroke="#30363d" stroke-width="1.5"/>

  <text x="200" y="150" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="bold">🔐 Confirm Payment</text>

  <!-- Merchant -->
  <text x="55" y="185" fill="#8b949e" font-size="11">Merchant</text>
  <text x="55" y="208" fill="#e6edf3" font-size="16" font-weight="bold">🏪 Naivas Supermarket</text>
  <text x="55" y="228" fill="#8b949e" font-size="12">Moi Avenue, Nairobi</text>

  <!-- Divider -->
  <line x1="55" y1="245" x2="345" y2="245" stroke="#30363d" stroke-width="0.5"/>

  <!-- Amount -->
  <text x="200" y="278" text-anchor="middle" fill="#43e97b" font-size="32" font-weight="bold">KSh 650.00</text>
  <text x="200" y="308" text-anchor="middle" fill="#4facfe" font-size="16" font-weight="bold">4.48 USDT</text>
  <text x="200" y="330" text-anchor="middle" fill="#8b949e" font-size="11">Rate: 1 USDT = KSh 145.00</text>

  <!-- Divider -->
  <line x1="55" y1="348" x2="345" y2="348" stroke="#30363d" stroke-width="0.5"/>

  <!-- Code Entry Section -->
  <text x="200" y="380" text-anchor="middle" fill="#fee140" font-size="13" font-weight="bold">Verify Code on POS Screen</text>

  <!-- Code Display -->
  <rect x="80" y="398" width="240" height="40" rx="8" fill="#0d1117" stroke="#4facfe" stroke-width="1.5"/>
  <text x="200" y="425" text-anchor="middle" fill="#4facfe" font-size="20" font-weight="bold" font-family="'JetBrains Mono', monospace">A7K3M9</text>

  <text x="200" y="460" text-anchor="middle" fill="#8b949e" font-size="11">Enter the code above to confirm</text>

  <!-- Input Boxes -->
  <rect x="75" y="480" width="250" height="50" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <text x="200" y="512" text-anchor="middle" fill="#e6edf3" font-size="16">_ _ _ _ _</text>

  <!-- Timer -->
  <text x="200" y="548" text-anchor="middle" fill="#fee140" font-size="13" font-weight="bold">⏱️ 52s remaining</text>

  <!-- Confirm Button -->
  <rect x="55" y="570" width="290" height="44" rx="22" fill="#667eea" filter="url(#shadow)"/>
  <text x="200" y="598" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">Confirm Payment</text>

  <!-- Cancel -->
  <text x="200" y="630" text-anchor="middle" fill="#8b949e" font-size="13">Cancel</text>

  <!-- Security Footer -->
  <text x="200" y="655" text-anchor="middle" fill="#8b949e" font-size="10">Secured by device key • No SMS</text>

  <!-- Bottom Navigation -->
  <rect x="20" y="740" width="360" height="42" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="55" y="766" text-anchor="middle" fill="#8b949e" font-size="14">🏠</text>
  <text x="130" y="766" text-anchor="middle" fill="#8b949e" font-size="14">💳</text>
  <text x="205" y="766" text-anchor="middle" fill="#667eea" font-size="14">📸</text>
  <text x="280" y="766" text-anchor="middle" fill="#8b949e" font-size="14">📊</text>
  <text x="355" y="766" text-anchor="middle" fill="#8b949e" font-size="14">⚙️</text>

  <rect x="160" y="788" width="80" height="4" rx="2" fill="#30363d"/>
</svg>