<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 850" font-family="'Segoe UI', 'SF Pro Display', Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="receiptGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5f5f5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.25"/>
    </filter>
    <filter id="cardShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="450" height="850" fill="#e8eaed" rx="0"/>

  <!-- Phone Frame -->
  <rect x="10" y="10" width="430" height="830" rx="35" fill="#1a1a2e" stroke="#30363d" stroke-width="2" filter="url(#shadow)"/>
  <rect x="20" y="20" width="410" height="810" rx="20" fill="#f0f2f5"/>

  <!-- Status Bar -->
  <text x="35" y="48" fill="#1a1a2e" font-size="12" font-weight="bold">9:41</text>
  <text x="385" y="48" text-anchor="end" fill="#1a1a2e" font-size="12">📶 🔋 100%</text>

  <!-- Header -->
  <text x="40" y="85" fill="#1a1a2e" font-size="18" font-weight="bold">← Receipt</text>

  <!-- Receipt Card -->
  <rect x="25" y="105" width="400" height="620" rx="14" fill="url(#receiptGrad)" filter="url(#cardShadow)"/>

  <!-- Receipt Header -->
  <rect x="25" y="105" width="400" height="60" rx="14" fill="url(#headerGrad)"/>
  <rect x="25" y="151" width="400" height="14" fill="url(#headerGrad)"/>

  <circle cx="225" cy="135" r="18" fill="#fff" opacity="0.2"/>
  <text x="225" y="142" text-anchor="middle" fill="#fff" font-size="20">✓</text>
  <text x="260" y="142" fill="#fff" font-size="16" font-weight="bold">Pago Exitoso</text>

  <!-- Merchant -->
  <text x="50" y="195" fill="#888" font-size="11">Merchant</text>
  <text x="50" y="218" fill="#1a1a2e" font-size="18" font-weight="bold">🏪 Naivas Supermercado</text>
  <text x="50" y="238" fill="#888" font-size="12">Avenida Moi, Nairobi</text>

  <!-- Divider -->
  <line x1="50" y1="255" x2="400" y2="255" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Amount -->
  <text x="50" y="285" fill="#888" font-size="11">Monto Pagado</text>
  <text x="50" y="325" fill="#1a1a2e" font-size="36" font-weight="bold">KSh 650.00</text>
  <text x="370" y="325" text-anchor="end" fill="#4facfe" font-size="20" font-weight="bold">4.48 USDT</text>

  <!-- Divider -->
  <line x1="50" y1="350" x2="400" y2="350" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Rate -->
  <text x="50" y="380" fill="#888" font-size="11">Tarifa Aplicada</text>
  <text x="50" y="405" fill="#1a1a2e" font-size="16" font-weight="bold">1 USDT = KSh 145.00</text>

  <!-- Divider -->
  <line x1="50" y1="425" x2="400" y2="425" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Fee -->
  <text x="50" y="455" fill="#888" font-size="11">Tarifa de Red</text>
  <text x="50" y="480" fill="#fee140" font-size="16" font-weight="bold">0.01 USDT</text>
  <text x="370" y="480" text-anchor="end" fill="#888" font-size="13">(KSh 1.45)</text>

  <!-- Divider -->
  <line x1="50" y1="500" x2="400" y2="500" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Receipt # -->
  <text x="50" y="530" fill="#888" font-size="11">Recibo #</text>
  <text x="50" y="555" fill="#4facfe" font-size="14" font-family="'JetBrains Mono', monospace">RCPT-20260127-1432</text>

  <!-- TX Hash -->
  <text x="50" y="585" fill="#888" font-size="11">Transaction</text>
  <text x="50" y="608" fill="#4facfe" font-size="12" font-family="'JetBrains Mono', monospace">0x8f3a...c21b</text>

  <!-- Divider -->
  <line x1="50" y1="625" x2="400" y2="625" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,4"/>

  <text x="225" y="655" text-anchor="middle" fill="#888" font-size="11">✅ No SMS trail • In-app only</text>

  <!-- Done Button -->
  <rect x="55" y="680" width="340" height="44" rx="22" fill="#667eea" filter="url(#shadow)"/>
  <text x="225" y="708" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">Hecho</text>

  <!-- Bottom Navigation -->
  <rect x="20" y="780" width="410" height="42" rx="12" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="55" y="806" text-anchor="middle" fill="#667eea" font-size="14">🏠</text>
  <text x="130" y="806" text-anchor="middle" fill="#8b949e" font-size="14">💳</text>
  <text x="205" y="806" text-anchor="middle" fill="#8b949e" font-size="14">📸</text>
  <text x="280" y="806" text-anchor="middle" fill="#8b949e" font-size="14">📊</text>
  <text x="355" y="806" text-anchor="middle" fill="#8b949e" font-size="14">⚙️</text>

  <rect x="165" y="828" width="80" height="4" rx="2" fill="#1a1a2e" opacity="0.2"/>
</svg>