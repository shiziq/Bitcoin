<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bato — Executive Slideshow · KCB USDT Payment System</title>
<style>
  :root { --ink: #0a0f1e; --slate: #1e2837; --gold: #f59e0b; --white: #ffffff; --steel: #94a3b8; --emerald: #059669; }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--ink); color: var(--white); overflow: hidden;
    height: 100vh; width: 100vw;
  }

  /* ═══════════ CONTAINER ═══════════════════ */
  .deck { width: 100vw; height: 100vh; position: relative; }

  .slide {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.8s cubic-bezier(0.4,0,0.2,1), transform 0.8s cubic-bezier(0.4,0,0.2,1);
    transform: scale(0.97);
    flex-direction: column; padding: 60px 80px;
  }
  .slide.active { opacity: 1; pointer-events: auto; transform: scale(1); }
  .slide.exit-left { opacity: 0; transform: translateX(-60px) scale(0.97); }
  .slide.exit-right { opacity: 0; transform: translateX(60px) scale(0.97); }
  .slide.enter-left { opacity: 1; transform: translateX(0) scale(1); }
  .slide.enter-right { opacity: 1; transform: translateX(0) scale(1); }

  /* ═══════════ SLIDE LAYOUTS ═══════════════ */
  .slide-full { padding: 0; }
  .slide-full img { width: 100%; height: 100%; object-fit: contain; background: var(--ink); }

  .slide-split { flex-direction: row; gap: 48px; padding: 60px 60px; }
  .slide-split .img-panel { flex: 1; display: flex; align-items: center; justify-content: center; max-height: 80vh; }
  .slide-split .img-panel img { max-width: 100%; max-height: 80vh; object-fit: contain; border-radius: 16px; box-shadow: 0 8px 40px rgba(0,0,0,0.4); }
  .slide-split .text-panel { flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .slide-split .text-panel h2 { font-size: 2rem; font-weight: 900; margin-bottom: 16px; letter-spacing: -0.5px; }
  .slide-split .text-panel h2 span { color: var(--gold); }
  .slide-split .text-panel p { font-size: 1.05rem; color: var(--steel); line-height: 1.7; margin-bottom: 12px; }
  .slide-split .text-panel .stat-badge { display: inline-block; background: rgba(5,150,105,0.15); color: var(--emerald); padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; margin-top: 8px; letter-spacing: 0.5px; }

  .slide-center { text-align: center; }
  .slide-center h2 { font-size: 2.4rem; font-weight: 900; margin-bottom: 20px; letter-spacing: -1px; max-width: 800px; }
  .slide-center h2 span { color: var(--gold); }
  .slide-center p { font-size: 1.1rem; color: var(--steel); line-height: 1.7; max-width: 650px; }
  .slide-center img { margin-top: 30px; max-width: 70%; max-height: 45vh; object-fit: contain; border-radius: 16px; box-shadow: 0 8px 40px rgba(0,0,0,0.4); }
  .slide-center .big-emoji { font-size: 5rem; margin-bottom: 16px; }

  .slide-comparison { flex-direction: column; gap: 24px; }
  .slide-comparison .row { display: flex; gap: 32px; width: 100%; max-width: 1100px; }
  .slide-comparison .col { flex: 1; background: var(--slate); border-radius: 20px; padding: 32px; }
  .slide-comparison .col.bad { border-left: 4px solid #e11d48; }
  .slide-comparison .col.good { border-left: 4px solid var(--emerald); }
  .slide-comparison .col h3 { font-size: 1.2rem; font-weight: 800; margin-bottom: 14px; }
  .slide-comparison .col.bad h3 { color: #e11d48; }
  .slide-comparison .col.good h3 { color: var(--emerald); }
  .slide-comparison .col .amount { font-size: 1.8rem; font-weight: 900; margin: 8px 0; }
  .slide-comparison .col .sub { font-size: 0.85rem; color: var(--steel); }
  .slide-comparison h2 { font-size: 2rem; font-weight: 900; text-align: center; }
  .slide-comparison h2 span { color: var(--gold); }

  .slide-grid { flex-direction: column; gap: 24px; }
  .slide-grid h2 { font-size: 1.6rem; font-weight: 900; text-align: center; margin-bottom: 4px; }
  .slide-grid h2 span { color: var(--gold); }
  .slide-grid .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 1100px; }
  .slide-grid .grid img { width: 100%; border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .slide-grid .grid .cap { font-size: 0.7rem; color: var(--steel); text-align: center; margin-top: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

  .slide-dual-img { flex-direction: row; gap: 32px; }
  .slide-dual-img img { max-width: 48%; max-height: 70vh; object-fit: contain; border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .slide-dual-img .vs { font-size: 2rem; color: var(--gold); font-weight: 900; }

  /* ═══════════ PROGRESS BAR ═══════════════ */
  .progress { position: fixed; top: 0; left: 0; height: 3px; background: var(--gold); z-index: 100; transition: width 0.5s linear; }
  .progress-container { position: fixed; top: 0; left: 0; width: 100vw; height: 3px; background: rgba(255,255,255,0.08); z-index: 99; }

  /* ═══════════ SCENE BADGE ═══════════════ */
  .scene-badge { position: fixed; top: 20px; right: 24px; z-index: 100; background: rgba(10,15,30,0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 6px 16px; font-size: 0.7rem; font-weight: 700; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; transition: all 0.4s; }

  /* ═══════════ NAV DOTS ══════════════════ */
  .nav-dots { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; gap: 8px; }
  .nav-dots .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); cursor: pointer; transition: all 0.3s; border: none; }
  .nav-dots .dot.active { background: var(--gold); width: 24px; border-radius: 4px; }
  .nav-dots .dot.scene-start { width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.3); }
  .nav-dots .dot.scene-start.active { border-color: var(--gold); background: var(--gold); }

  /* ═══════════ PAUSE BUTTON ══════════════ */
  .pause-btn { display: none; }

  /* ═══════════ FADE-IN TEXT ANIMATION ═════ */
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .anim-up { animation: fadeInUp 0.6s ease-out forwards; }
  .anim-up-d1 { animation-delay: 0.15s; opacity: 0; }
  .anim-up-d2 { animation-delay: 0.3s; opacity: 0; }

  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
  .pulse { animation: pulse 2s ease-in-out infinite; }

  @keyframes shimmer { 0% { background-position: -200px 0; } 100% { background-position: 200px 0; } }
  .shimmer { background: linear-gradient(90deg, transparent, rgba(245,158,11,0.1), transparent); background-size: 200px 100%; animation: shimmer 2s infinite; }

  @media (max-width: 900px) {
    .slide { padding: 30px 20px; }
    .slide-split { flex-direction: column; gap: 20px; padding: 20px; }
    .slide-center h2 { font-size: 1.4rem; }
    .slide-center img { max-width: 95%; max-height: 35vh; }
    .slide-grid .grid { grid-template-columns: 1fr 1fr; }
    .slide-comparison .row { flex-direction: column; }
  }
</style>

// Flatten all slides for the linear deck
const ALL_SLIDES = [];
const SCENE_BOUNDARIES = [0];
SCENES.forEach(scene => {
  scene.slides.forEach(s => ALL_SLIDES.push(s));
  SCENE_BOUNDARIES.push(ALL_SLIDES.length);
});

let currentSlide = 0;

function renderDeck() {
  const deck = document.getElementById('deck');
  deck.innerHTML = '';

  ALL_SLIDES.forEach((slide, i) => {
    const div = document.createElement('div');
    div.className = `slide slide-${slide.layout}`;
    if (i === currentSlide) div.classList.add('active');
    div.innerHTML = slide.content;
    deck.appendChild(div);
  });

  renderNavDots();
  updateProgress();
}

function renderNavDots() {
  const container = document.getElementById('navDots');
  container.innerHTML = '';

  ALL_SLIDES.forEach((slide, i) => {
    const dot = document.createElement('button');
    dot.className = 'dot';
    if (i === currentSlide) dot.classList.add('active');
    // Check if this slide starts a new scene
    if (SCENE_BOUNDARIES.includes(i) && i > 0) dot.classList.add('scene-start');
    dot.onclick = () => goToSlide(i);
    container.appendChild(dot);
  });
}

function updateProgress() {
  const pct = ((currentSlide) / (ALL_SLIDES.length - 1)) * 100;
  document.getElementById('progressBar').style.width = pct + '%';

  // Find which scene we're in
  let sceneIdx = 1;
  for (let i = 1; i < SCENE_BOUNDARIES.length; i++) {
    if (currentSlide < SCENE_BOUNDARIES[i]) { sceneIdx = i; break; }
  }
  document.getElementById('sceneBadge').textContent = `SCENE ${sceneIdx} / ${SCENES.length}`;
}

function goToSlide(index) {
  if (index < 0 || index >= ALL_SLIDES.length) return;

  const oldEl = document.querySelector('.slide.active');
  const newEl = document.querySelectorAll('.slide')[index];

  if (oldEl) oldEl.classList.remove('active');
  if (newEl) {
    newEl.classList.add('active');
    // Reset animations on child elements
    newEl.querySelectorAll('.anim-up, .anim-up-d1, .anim-up-d2').forEach(el => {
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = '';
    });
  }

  currentSlide = index;
  updateProgress();
  renderNavDots();
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault();
    if (currentSlide < ALL_SLIDES.length - 1) {
      goToSlide(currentSlide + 1);
    }
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (currentSlide > 0) {
      goToSlide(currentSlide - 1);
    }
  }
});

// Start
renderDeck();
</script>
</body>
</html>
