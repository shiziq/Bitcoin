  :root {
    --primary: #4f46e5; --primary-glow: rgba(79,70,229,0.12);
    --accent: #f59e0b; --accent-glow: rgba(245,158,11,0.15);
    --emerald: #059669; --emerald-glow: rgba(5,150,105,0.12);

  body {

  /* ═══════════ DECK ═══════════════════════ */
  .deck { width: 100vw; height: 100vh; position: relative; }
  .slide {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.7s cubic-bezier(0.4,0,0.2,1), transform 0.7s cubic-bezier(0.4,0,0.2,1);
    transform: scale(0.97); flex-direction: column; padding: 60px 80px;
  }
  .slide.active { opacity: 1; pointer-events: auto; transform: scale(1); }

  /* ═══════════ LAYOUTS ════════════════════ */
  .slide-center { text-align: center; }
  .slide-center .emoji { font-size: 4.5rem; margin-bottom: 16px; line-height: 1; }
  .slide-center h2 { font-family: 'Cormorant Garamond', serif; font-size: 2.8rem; font-weight: 500; letter-spacing: -0.5px; margin-bottom: 18px; max-width: 800px; margin-left: auto; margin-right: auto; }
  .slide-center h2 em { font-style: italic; color: var(--accent); }
  .slide-center p { font-family: 'DM Sans', sans-serif; font-size: 1.05rem; color: var(--text-secondary); line-height: 1.7; max-width: 650px; margin-left: auto; margin-right: auto; }
  .slide-center img { margin-top: 24px; max-width: 65%; max-height: 42vh; object-fit: contain; border-radius: var(--radius); box-shadow: var(--shadow-lg); }

  .slide-split { flex-direction: row; gap: 48px; padding: 56px 56px; }
  .slide-split .img-panel { flex: 1; display: flex; align-items: center; justify-content: center; max-height: 82vh; }
  .slide-split .img-panel img { max-width: 100%; max-height: 82vh; object-fit: contain; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); }
  .slide-split .text-panel { flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .slide-split .text-panel h2 { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 500; letter-spacing: -0.3px; margin-bottom: 14px; }
  .slide-split .text-panel h2 em { font-style: italic; color: var(--accent); }
  .slide-split .text-panel p { font-size: 1rem; color: var(--text-secondary); line-height: 1.7; margin-bottom: 10px; }
  .slide-split .text-panel .badge { display: inline-block; background: rgba(5,150,105,0.15); color: var(--emerald); padding: 5px 14px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; margin-top: 6px; letter-spacing: 0.5px; }

  .slide-grid { flex-direction: column; gap: 20px; }
  .slide-grid h2 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 500; text-align: center; margin-bottom: 4px; letter-spacing: -0.3px; }
  .slide-grid h2 em { font-style: italic; color: var(--accent); }
  .slide-grid .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 18px; width: 100%; max-width: 1050px; }
  .slide-grid .grid img { width: 100%; border-radius: var(--radius); box-shadow: var(--shadow-sm); }
  .slide-grid .grid .cap { font-family: 'DM Sans', sans-serif; font-size: 0.65rem; color: var(--text-muted); text-align: center; margin-top: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

  .slide-comparison { flex-direction: column; gap: 20px; }
  .slide-comparison h2 { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 500; text-align: center; letter-spacing: -0.3px; }
  .slide-comparison h2 em { font-style: italic; color: var(--accent); }
  .slide-comparison .row { display: flex; gap: 28px; width: 100%; max-width: 1050px; }
  .slide-comparison .col { flex: 1; background: var(--dark-surface); border-radius: var(--radius-lg); padding: 28px 30px; }
  .slide-comparison .col.bad { border-left: 4px solid #e11d48; }
  .slide-comparison .col.good { border-left: 4px solid var(--emerald); }
  .slide-comparison .col h3 { font-family: 'DM Sans', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 12px; }
  .slide-comparison .col.bad h3 { color: #e11d48; }
  .slide-comparison .col.good h3 { color: var(--emerald); }
  .slide-comparison .col .amount { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 600; margin: 8px 0; }
  .slide-comparison .col .sub { font-size: 0.82rem; color: var(--text-secondary); }

  .slide-dual-img { flex-direction: row; gap: 28px; }
  .slide-dual-img img { max-width: 47%; max-height: 72vh; object-fit: contain; border-radius: var(--radius); box-shadow: var(--shadow-sm); }
  .slide-dual-img .vs { font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: var(--accent); font-weight: 600; display: flex; align-items: center; }

  /* ═══════════ PROGRESS ══════════════════ */
  .progress-container { position: fixed; top: 0; left: 0; width: 100vw; height: 3px; background: rgba(255,255,255,0.06); z-index: 99; }
  .progress { position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(90deg, var(--primary), var(--accent)); z-index: 100; transition: width 0.5s ease; }

  /* ═══════════ BADGE ═════════════════════ */
  .scene-badge {
    position: fixed; top: 20px; right: 24px; z-index: 100;
    background: rgba(10,15,30,0.85); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
    padding: 5px 16px; font-family: 'DM Sans', sans-serif;
    font-size: 0.62rem; font-weight: 700; color: var(--accent);
    letter-spacing: 1.5px; text-transform: uppercase;
    transition: all 0.4s;
  }
  .scene-label { display: block; font-size: 0.5rem; color: rgba(255,255,255,0.5); letter-spacing: 1px; margin-top: 1px; }

  /* ═══════════ DOTS ══════════════════════ */
  .nav-dots { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; gap: 10px; }
  .nav-dots .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.2); cursor: pointer; border: none; padding: 0; transition: all 0.3s; }
  .nav-dots .dot.active { background: var(--accent); width: 28px; border-radius: 5px; }
  .nav-dots .dot.scene-start { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); }
  .nav-dots .dot.scene-start.active { border-color: var(--accent); background: var(--accent); }

  /* ═══════════ ARROWS ════════════════════ */
  .nav-arrow { position: fixed; top: 50%; transform: translateY(-50%); z-index: 100; background: rgba(10,15,30,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-size: 1.3rem; transition: all 0.3s; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
  .nav-arrow:hover, .nav-arrow:active { background: rgba(30,40,55,0.9); border-color: var(--accent); }
  .nav-arrow.left { left: 16px; }
  .nav-arrow.right { right: 16px; }

  /* ═══════════ ANIMATIONS ════════════════ */
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .anim-up { animation: fadeInUp 0.6s ease-out forwards; }
  .anim-up-d1 { animation-delay: 0.12s; opacity: 0; }
  .anim-up-d2 { animation-delay: 0.24s; opacity: 0; }

  /* ═══════════ RESPONSIVE ════════════════ */
  @media (max-width: 900px) {
    .slide { padding: 24px 18px; }
    .slide-split { flex-direction: column; gap: 16px; padding: 24px 18px; }
    .slide-center h2 { font-size: 1.5rem; }
    .slide-center img { max-width: 95%; max-height: 32vh; }
    .slide-grid .grid { grid-template-columns: 1fr 1fr; }
    .slide-comparison .row { flex-direction: column; }
    .nav-arrow { width: 36px; height: 36px; font-size: 1rem; }
    .nav-arrow.left { left: 6px; }
    .nav-arrow.right { right: 6px; }
    .nav-dots { bottom: 24px; gap: 8px; }
    .nav-dots .dot { width: 12px; height: 12px; }
    .nav-dots .dot.active { width: 32px; }
    .scene-badge { top: 10px; right: 10px; font-size: 0.55rem; padding: 4px 10px; }
  }

  /* ═══════════ NAV LINKS BAR ═══════════════ */
  .nav-links { position: fixed; top: 48px; right: 24px; z-index: 101; display: flex; gap: 10px; }
  .nav-links a { display: inline-block; background: rgba(10,15,30,0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 5px 14px; font-family: 'DM Sans', sans-serif; font-size: 0.6rem; font-weight: 600; color: var(--text-secondary); text-decoration: none; letter-spacing: 0.5px; transition: all 0.3s; white-space: nowrap; }
  .nav-links a:hover { border-color: var(--accent); color: var(--accent); }

  /* ═══════════ SIGN-IN OVERLAY ═════════════ */
  .signin-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(10,15,30,0.92); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; }

  .signin-card { background: var(--dark-surface); border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius-lg); padding: 40px 44px; text-align: center; max-width: 380px; width: 90%; }
  .signin-card h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .signin-card p { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 20px; }
  .signin-card input { width: 100%; background: var(--dark); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-sm); padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; color: var(--text); margin-bottom: 10px; outline: none; transition: border-color 0.3s; }
  .signin-card input:focus { border-color: var(--accent); }
  .signin-card button { width: 100%; background: var(--accent); color: var(--dark); border: none; border-radius: var(--radius-sm); padding: 10px; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 700; cursor: pointer; letter-spacing: 0.5px; text-transform: uppercase; transition: all 0.3s; }
  .signin-card button:hover { opacity: 0.9; }
</style>

      { layout: "center", content: `<h2 class="anim-up">This is <em>Bato</em></h2><p class="anim-up anim-up-d1">First bank in Kenya — in Africa — with a stablecoin payment system inside the banking app.</p><p class="anim-up anim-up-d2">Flat KSh 0.15 per transfer. Zero SMS. 2-second settlement. Multi-chain ready.<br><strong style="color:var(--accent);">The question is: which bank gets there first?</strong></p><img class="anim-up anim-up-d2" src="assets/KCB Logo.png" alt="KCB" style="max-width:120px;margin-top:14px;display:inline-block;"><img class="anim-up anim-up-d2" src="assets/Bato Logo.png" alt="Bato" style="max-width:120px;margin-top:14px;display:inline-block;margin-left:12px;">` },
    ]
  },
];

const ALL_SLIDES = []; const SCENE_BOUNDARIES = [0];
SCENES.forEach(scene => { scene.slides.forEach(s => ALL_SLIDES.push(s)); SCENE_BOUNDARIES.push(ALL_SLIDES.length); });
let currentSlide = 0;

function renderDeck() {
  const deck = document.getElementById('deck'); deck.innerHTML = '';
  ALL_SLIDES.forEach((slide, i) => { const div = document.createElement('div'); div.className = `slide slide-${slide.layout}`; if (i === currentSlide) div.classList.add('active'); div.innerHTML = slide.content; deck.appendChild(div); });
  renderNavDots(); updateProgress(); updateArrows();
}
function renderNavDots() {
  const c = document.getElementById('navDots'); c.innerHTML = '';
  ALL_SLIDES.forEach((_, i) => { const d = document.createElement('button'); d.className = 'dot'; if (i === currentSlide) d.classList.add('active'); if (SCENE_BOUNDARIES.includes(i) && i > 0) d.classList.add('scene-start'); d.onclick = () => goToSlide(i); c.appendChild(d); });
}
function updateProgress() {
  document.getElementById('progressBar').style.width = ((currentSlide) / (ALL_SLIDES.length - 1)) * 100 + '%';
  let si = 1; for (let i = 1; i < SCENE_BOUNDARIES.length; i++) { if (currentSlide < SCENE_BOUNDARIES[i]) { si = i; break; } }
  document.getElementById('sceneBadge').innerHTML = `SCENE ${si} / ${SCENES.length}<span class="scene-label">${SCENES[si-1].title}</span>`;
}
function updateArrows() {
  document.getElementById('prevBtn').style.opacity = currentSlide === 0 ? '0.2' : '1';
  document.getElementById('nextBtn').style.opacity = currentSlide === ALL_SLIDES.length - 1 ? '0.2' : '1';
}
function goToSlide(index) {
  if (index < 0 || index >= ALL_SLIDES.length) return;
  const old = document.querySelector('.slide.active'), neu = document.querySelectorAll('.slide')[index];
  if (old) old.classList.remove('active');
  if (neu) { neu.classList.add('active'); neu.querySelectorAll('.anim-up,.anim-up-d1,.anim-up-d2').forEach(el => { el.style.animation = 'none'; el.offsetHeight; el.style.animation = ''; }); }
  currentSlide = index; updateProgress(); renderNavDots(); updateArrows();
}
// Tap on slide to advance
document.getElementById('deck').addEventListener('click', e => { if (currentSlide < ALL_SLIDES.length - 1) goToSlide(currentSlide + 1); });
// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); if (currentSlide < ALL_SLIDES.length - 1) goToSlide(currentSlide + 1); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); if (currentSlide > 0) goToSlide(currentSlide - 1); }
});
// Swipe
let tx = 0, ty = 0;
document.getElementById('deck').addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, { passive: true });
document.getElementById('deck').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx, dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) { if (dx < 0 && currentSlide < ALL_SLIDES.length - 1) goToSlide(currentSlide + 1); else if (dx > 0 && currentSlide > 0) goToSlide(currentSlide - 1); }
});
renderDeck();

// Visitor sign-in
const VISITORS_KEY = 'bato_visitors';
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbz--bexRFIHT7g27O48u_3qV0ZGChTmYL-RvoW6DqPJ79dD-wkIiW8Zhma6XQpj0X9C/exec';

function submitVisitor() {
  const name = document.getElementById('visitorName').value.trim();
  const company = document.getElementById('visitorCompany').value.trim();
  if (!name || !company) { alert('Please enter both your name and company.'); return; }

  // Store locally for return-visit detection
  const visitors = JSON.parse(localStorage.getItem(VISITORS_KEY) || '[]');
  visitors.push({ name, company, timestamp: new Date().toISOString() });
  localStorage.setItem(VISITORS_KEY, JSON.stringify(visitors));

  // Send to Google Sheets via Apps Script web app
  fetch(WEBAPP_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, company })
  }).catch(() => {}); // Silent fail — user proceeds regardless

  document.getElementById('signinOverlay').classList.add('hidden');
}

// Check if previously signed in
if (localStorage.getItem(VISITORS_KEY)) {
  document.getElementById('signinOverlay').classList.add('hidden');
}
</script>
